       action 1.1 cli command "configure terminal"
       action 1.2 cli command "crypto key generate rsa modulus 2048"
       action 1.3 cli command "end"
       action 1.4 cli command "no event manager applet GENERATE-SSH-KEY"
      !
      interface Loopback0
       ip address 100.127.0.11 255.255.255.255
       ip router isis sa51
      !
      interface GigabitEthernet1
       description TO-ISP-01
       ip address 203.0.113.2 255.255.255.248
       ip router isis sa51
       isis network point-to-point
       no shutdown
      !
      interface GigabitEthernet2
       description TO-EDGE-02
       ip address 100.126.1.33 255.255.255.248
       ip router isis sa51
       isis network point-to-point
       no shutdown
      !
      interface GigabitEthernet3
       description TO-CORE-01
       ip address 100.126.1.1 255.255.255.248
       ip router isis sa51
       isis network point-to-point
       no shutdown
      !
      interface GigabitEthernet4
       description TO-CORE-02
       ip address 100.126.1.9 255.255.255.248
       ip router isis sa51
       isis network point-to-point
       no shutdown
      !
      router isis sa51
       net 49.0051.1001.2700.0011.00
       is-type level-2-only
       metric-style wide
       log-adjacency-changes
      !
      router bgp 4208675309
       bgp router-id 100.127.0.11
       bgp log-neighbor-changes
       timers bgp 5 15
       neighbor EVPN-RR peer-group
       neighbor EVPN-RR remote-as 4208675309
       neighbor EVPN-RR update-source Loopback0
       neighbor 100.127.1.1 peer-group EVPN-RR
       neighbor 100.127.1.2 peer-group EVPN-RR
       !
       address-family ipv4 unicast
        neighbor 100.127.1.1 activate
        neighbor 100.127.1.2 activate
       !
       address-family l2vpn evpn
        neighbor 100.127.1.1 activate
        neighbor 100.127.1.2 activate
      !
      line con 0
       logging synchronous
      line vty 0 4
       transport input ssh
       login local
      !
      end
